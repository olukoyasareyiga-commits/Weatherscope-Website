<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyCast — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sky: #0a0e1a;
    --accent: #4fc3f7;
    --gold: #ffd54f;
    --white: #f0f4ff;
    --muted: #7a8baa;
    --card: rgba(15,30,65,0.7);
    --border: rgba(79,195,247,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sky);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  canvas#stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* Gradient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(79,195,247,0.12); top: -100px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,213,79,0.07); bottom: -80px; left: -80px; }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 400px;
    padding: 1rem;
    animation: slideIn 0.8s ease forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .brand {
    text-align: center;
    margin-bottom: 2rem;
  }
  .brand-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 5px;
    background: linear-gradient(135deg, #4fc3f7, #ffd54f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 15px rgba(79,195,247,0.4));
  }
  .brand-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  .weather-badge {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 1.8rem;
    font-size: 1.4rem;
  }

  h2 {
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: var(--white);
  }

  .field {
    margin-bottom: 1.2rem;
  }
  label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }
  input:focus {
    border-color: var(--accent);
    background: rgba(79,195,247,0.06);
  }
  input::placeholder { color: var(--muted); }

  .remember {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    cursor: pointer;
  }
  .remember input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .btn-login {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 6px 25px rgba(79,195,247,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 35px rgba(79,195,247,0.45);
  }
  .btn-login:active { transform: translateY(0); }

  /* Ripple */
  .btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.3s;
  }
  .btn-login:active::after { background: rgba(255,255,255,0.1); }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.2rem 0;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .btn-guest {
    width: 100%;
    padding: 0.85rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
  }
  .btn-guest:hover {
    background: rgba(79,195,247,0.07);
    border-color: var(--accent);
  }

  .footer-links {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .footer-links a { color: var(--accent); text-decoration: none; }

  .error-msg {
    background: rgba(255,82,82,0.1);
    border: 1px solid rgba(255,82,82,0.3);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-size: 0.82rem;
    color: #ff6b6b;
    margin-bottom: 1rem;
    display: none;
  }

  .loading-dots {
    display: none;
    justify-content: center;
    gap: 6px;
    padding: 0.5rem;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 0.8s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-logo">SkyCast</div>
      <div class="brand-sub">Weather Intelligence</div>
    </div>

    <div class="weather-badge">🌤️ 🌧️ ⛅ 🌩️</div>

    <h2>Sign in to continue</h2>

    <div class="error-msg" id="errMsg">Invalid credentials. Try again.</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"/>
    </div>

    <div class="remember">
      <input type="checkbox" id="rememberMe"/>
      <label for="rememberMe" style="text-transform:none;letter-spacing:0;margin:0;cursor:pointer">Remember me</label>
    </div>

    <button class="btn-login" onclick="doLogin()">Sign In</button>

    <div class="loading-dots" id="loader">
      <span></span><span></span><span></span>
    </div>

    <div class="divider">or</div>

    <button class="btn-guest" onclick="guestLogin()">🌍 Continue as Guest</button>

    <div class="footer-links">
      <p style="margin-top:1rem">Demo: use any username & password</p>
    </div>
  </div>
</div>

<script>
  // Stars
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initStars() {
    stars = [];
    for (let i = 0; i < 150; i++) {
      stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, alpha: Math.random(), speed: Math.random()*0.007+0.002, dir: Math.random()>0.5?1:-1 });
    }
  }
  function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      s.alpha += s.speed * s.dir;
      if (s.alpha>=1||s.alpha<=0) s.dir*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${s.alpha})`; ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resize(); initStars(); drawStars();
  window.addEventListener('resize',()=>{resize();initStars();});

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const err = document.getElementById('errMsg');
    const loader = document.getElementById('loader');

    if (!u || !p) {
      err.style.display = 'block';
      err.textContent = 'Please fill in all fields.';
      return;
    }

    err.style.display = 'none';
    loader.style.display = 'flex';

    // Save user
    localStorage.setItem('skycast_user', u);

    setTimeout(() => {
      loader.style.display = 'none';
      window.location.href = 'weather.html';
    }, 1200);
  }

  function guestLogin() {
    localStorage.setItem('skycast_user', 'Guest');
    window.location.href = 'weather.html';
  }

  // Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
