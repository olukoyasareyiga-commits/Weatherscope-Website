<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyCast — Weather App</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sky: #0a0e1a;
    --mid: #0f1e3d;
    --accent: #4fc3f7;
    --gold: #ffd54f;
    --white: #f0f4ff;
    --muted: #7a8baa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sky);
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Animated starfield */
  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Moon glow */
  .moon {
    position: fixed;
    top: 8vh;
    right: 10vw;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff9c4, #ffd54f 60%, #ff8f00);
    box-shadow: 0 0 60px 20px rgba(255,213,79,0.3), 0 0 120px 50px rgba(255,213,79,0.1);
    animation: moonFloat 6s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes moonFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* Clouds */
  .clouds { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .cloud {
    position: absolute;
    border-radius: 50px;
    background: rgba(79,195,247,0.06);
    filter: blur(12px);
    animation: drift linear infinite;
  }
  .cloud:nth-child(1) { width: 200px; height: 40px; top: 20%; left: -200px; animation-duration: 30s; animation-delay: 0s; }
  .cloud:nth-child(2) { width: 300px; height: 55px; top: 35%; left: -300px; animation-duration: 45s; animation-delay: -10s; }
  .cloud:nth-child(3) { width: 180px; height: 35px; top: 55%; left: -180px; animation-duration: 38s; animation-delay: -20s; }
  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(120vw); } }

  /* Main content */
  .hero {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    animation: fadeUp 1.2s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 15vw, 7rem);
    letter-spacing: 6px;
    background: linear-gradient(135deg, #4fc3f7, #fff9c4, #ffd54f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(79,195,247,0.4));
  }

  .tagline {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0.6rem 0 2.5rem;
  }

  /* Weather icons row */
  .icons-row {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2.8rem;
    font-size: 2rem;
    animation: fadeUp 1.4s ease forwards;
  }
  .icon-card {
    background: rgba(79,195,247,0.07);
    border: 1px solid rgba(79,195,247,0.15);
    border-radius: 16px;
    padding: 0.8rem 1rem;
    backdrop-filter: blur(10px);
    transition: transform 0.3s, background 0.3s;
  }
  .icon-card:hover { transform: translateY(-6px); background: rgba(79,195,247,0.14); }

  .cta-btn {
    display: inline-block;
    padding: 1rem 3rem;
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 3px;
    border-radius: 50px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(79,195,247,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 1.6s ease forwards;
  }
  .cta-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 12px 40px rgba(79,195,247,0.5);
  }

  .sub-text {
    margin-top: 1.2rem;
    font-size: 0.8rem;
    color: var(--muted);
    animation: fadeUp 1.8s ease forwards;
  }
  .sub-text a { color: var(--accent); text-decoration: none; }

  /* Bottom wave */
  .wave {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(79,195,247,0.05), transparent);
    z-index: 1;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="moon"></div>
<div class="clouds">
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
</div>

<div class="hero">
  <div class="logo">SkyCast</div>
  <p class="tagline">Real-time weather, anywhere on Earth</p>

  <div class="icons-row">
    <div class="icon-card">🌤️</div>
    <div class="icon-card">🌧️</div>
    <div class="icon-card">❄️</div>
    <div class="icon-card">⚡</div>
    <div class="icon-card">🌪️</div>
  </div>

  <a href="login.html" class="cta-btn">Get Started</a>
  <p class="sub-text">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<div class="wave"></div>

<script>
  // Starfield canvas
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        alpha: Math.random(),
        speed: Math.random() * 0.008 + 0.002,
        dir: Math.random() > 0.5 ? 1 : -1
      });
    }
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.alpha += s.speed * s.dir;
      if (s.alpha >= 1 || s.alpha <= 0) s.dir *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${s.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  drawStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
</script>
</body>
</html>
